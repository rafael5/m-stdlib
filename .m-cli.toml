# m-cli configuration for m-stdlib.
# See https://github.com/rafael5/m-cli for the full schema.

[fmt]
rules = "canonical"

[lint]
rules = "default"
disable = []
target-engine = "any"

[lint.severity]
# STDFMT and STDJSON take parametrised mixed-case lvns by design
# (named substitutions, JSON keys); downgrade the family-wide
# warning to INFO so it doesn't drown the signal.
"M-XINDX-057" = "INFO"

[lsp]
"hover.format" = "markdown"
